         '-t', 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent1b:latest', '.']

- name: 'gcr.io/cloud-builders/docker'
  id: build-agent3
  waitFor: ['-']
  args: ['build', '--build-arg', 'AGENT_NAME=agent3',
         '-t', 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent3:latest', '.']

- name: 'gcr.io/cloud-builders/docker'
  id: build-agent4
  waitFor: ['-']
