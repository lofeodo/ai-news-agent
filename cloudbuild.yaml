steps:
# Build all agent images in parallel (waitFor: ['-'] means "start immediately")
- name: 'gcr.io/cloud-builders/docker'
  id: build-agent1a
  waitFor: ['-']
  args: ['build', '--build-arg', 'AGENT_NAME=agent1a',
         '-t', 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent1a:latest', '.']

- name: 'gcr.io/cloud-builders/docker'
  id: build-agent1b
  waitFor: ['-']
  args: ['build', '--build-arg', 'AGENT_NAME=agent1b',
         '-t', 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent1b:latest', '.']

- name: 'gcr.io/cloud-builders/docker'
