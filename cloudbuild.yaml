- 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent1a:latest'
- 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent1b:latest'
- 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent2a:latest'
- 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent2b:latest'
- 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent3:latest'
