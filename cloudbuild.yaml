  args: ['build', '--build-arg', 'AGENT_NAME=agent2b',
         '-t', 'northamerica-northeast1-docker.pkg.dev/ai-news-letter-497720/ai-news-agent/agent2b:latest', '.']

- name: 'gcr.io/cloud-builders/docker'
  id: build-agent3
