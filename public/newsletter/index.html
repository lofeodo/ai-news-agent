<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latent SpaceMail</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo-mark.svg">
  <link rel="icon" type="image/png" href="/images/logo-email.png">
  <link rel="preload" href="/fonts/cormorant-garamond-600.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;will-change:transform;"></canvas>

  <a class="issue-teaser" href="/preview.html">
    <span class="issue-teaser__left">
      <span class="issue-teaser__dot"></span>
      <span class="issue-teaser__label">This week's issue</span>
      <span class="issue-teaser__title">Read the latest briefing</span>
    </span>
    <span class="issue-teaser__arrow">Read it →</span>
  </a>

  <div class="card">
    <h1><span class="prompt">❯</span> Latent SpaceMail</h1>
    <p class="subtitle">A weekly briefing on AI research and industry news.<br>Delivered every Monday morning.</p>

    <p id="spots-remaining" class="spots-counter"></p>

    <div id="auth-error" class="msg error" style="display:none;margin-bottom:16px;"></div>

    <button type="button" id="google-btn" class="btn-google">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <a href="login.html" class="btn-email-link">Sign in with email →</a>

    <!-- Shown instead of sign-in buttons when already authenticated -->
    <div id="signed-in-ctas" style="display:none">
      <a href="preferences.html" class="btn-primary-action">Manage preferences →</a>
      <a href="latest.html" class="btn-secondary-link">View latest issue →</a>
    </div>
  </div>

  <script src="bg.js"></script>
  <script type="module" src="nav.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged } from './auth.js';
    import {
      GoogleAuthProvider,
      signInWithPopup,
    } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

    const API = 'https://agent-subscriptions-zozrn33sna-nn.a.run.app';

    onAuthStateChanged(auth, (user) => {
      if (user && user.emailVerified) {
        // Swap sign-in UI for account CTAs — no redirect so the page stays browsable
        document.getElementById('google-btn').style.display       = 'none';
        document.querySelector('.auth-divider').style.display     = 'none';
        document.querySelector('.btn-email-link').style.display   = 'none';
        document.getElementById('signed-in-ctas').style.display   = 'block';
      }
    });

    async function loadSpots() {
      try {
        const res = await fetch(`${API}/stats`);
        if (!res.ok) return;
        const { active, max } = await res.json();
        const el = document.getElementById('spots-remaining');
        if (!el) return;
        el.textContent = `${active} / ${max}`;
        if (active >= max) el.classList.add('spots-full');
      } catch (e) {}
    }
    loadSpots();

    const googleBtn  = document.getElementById('google-btn');
    const authError  = document.getElementById('auth-error');

    const googleSvg = googleBtn.querySelector('svg').outerHTML;

    function showError(msg) {
      authError.textContent    = msg;
      authError.style.display  = 'block';
    }

    googleBtn.addEventListener('click', async () => {
      authError.style.display = 'none';
      googleBtn.disabled = true;
      googleBtn.textContent = 'Connecting…';
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        // onAuthStateChanged handles redirect to preferences.html
      } catch (e) {
        const code = e?.code || '';
        if (code !== 'auth/popup-closed-by-user') {
          if (code === 'auth/popup-blocked') {
            showError('Sign-in popup was blocked. Allow popups for this site and try again.');
          } else if (code === 'auth/unauthorized-domain') {
            showError('Sign-in is not enabled for this domain. Contact the site owner.');
          } else if (code === 'auth/network-request-failed') {
            showError('Network error. Check your connection and try again.');
          } else {
            showError('Something went wrong. Please try again.');
          }
        }
        googleBtn.disabled = false;
        googleBtn.innerHTML = `${googleSvg} Continue with Google`;
      }
    });
  </script>
</body>
</html>
