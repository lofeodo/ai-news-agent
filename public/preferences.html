<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferences — Latent SpaceMail</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;will-change:transform;"></canvas>

  <a class="wordmark" href="/">Latent SpaceMail</a>

  <div class="card">
    <h1><span class="prompt">❯</span> Manage preferences</h1>

    <!-- Shown while loading -->
    <p class="subtitle" id="loading-msg">Loading your preferences…</p>

    <!-- Shown on invalid/missing token -->
    <p class="msg error" id="invalid-msg">This link is invalid or has expired. Request a new one below.</p>

    <!-- Populated on success -->
    <form id="prefs-form" style="display:none" novalidate>
      <div class="email-display" id="email-display"></div>

      <div class="checkboxes">
        <label as="div">Newsletter content</label>
        <label class="check-row">
          <input type="checkbox" id="include_french" name="include_french">
          <span>French-language articles<span class="check-desc">AI coverage from French-language sources</span></span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="include_canada" name="include_canada">
          <span>Canada &amp; Montréal section<span class="check-desc">Local AI news from across Canada</span></span>
        </label>
      </div>

      <button type="submit" id="save-btn">Save preferences</button>
      <div class="msg" id="save-msg"></div>
    </form>

    <!-- Request new link (always visible after load attempt) -->
    <div id="new-link-section" style="display:none">
      <hr class="divider">
      <p class="note" style="margin-bottom:14px">Need a new preferences link? Enter your email and we'll send one.</p>
      <form id="request-form" novalidate>
        <div class="field">
          <label for="req-email">Email address</label>
          <input type="email" id="req-email" name="email" autocomplete="email" placeholder="you@example.com">
        </div>
        <button type="submit" id="req-btn">Send preferences link</button>
        <div class="msg" id="req-msg"></div>
      </form>
    </div>
  </div>

  <div class="nav-links">
    <a href="/">Subscribe</a>
    <a href="unsubscribe.html">Unsubscribe</a>
  </div>

  <script>
    const API = 'https://agent-subscriptions-zozrn33sna-nn.a.run.app';

    const token = new URLSearchParams(location.search).get('token') || '';

    const loadingMsg  = document.getElementById('loading-msg');
    const invalidMsg  = document.getElementById('invalid-msg');
    const prefsForm   = document.getElementById('prefs-form');
    const emailDisplay = document.getElementById('email-display');
    const saveBtn     = document.getElementById('save-btn');
    const saveMsg     = document.getElementById('save-msg');
    const newLinkSection = document.getElementById('new-link-section');

    function showSaveMsg(text, type) {
      saveMsg.textContent = text;
      saveMsg.className = `msg visible ${type}`;
    }

    function showInvalid() {
      loadingMsg.style.display = 'none';
      invalidMsg.className = 'msg error visible';
      newLinkSection.style.display = 'block';
    }

    async function loadPrefs() {
      if (!token) { showInvalid(); return; }

      try {
        const res = await fetch(`${API}/preferences?token=${encodeURIComponent(token)}`);
        loadingMsg.style.display = 'none';

        if (!res.ok) { showInvalid(); return; }

        const data = await res.json();
        emailDisplay.textContent = data.email || '';
        document.getElementById('include_french').checked = !!(data.prefs && data.prefs.include_french);
        document.getElementById('include_canada').checked = !!(data.prefs && data.prefs.include_canada);
        prefsForm.style.display = 'block';
        newLinkSection.style.display = 'block';
      } catch {
        loadingMsg.style.display = 'none';
        showInvalid();
      }
    }

    prefsForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      saveBtn.disabled = true;
      saveMsg.className = 'msg';

      try {
        const res = await fetch(`${API}/preferences`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token,
            prefs: {
              include_french: document.getElementById('include_french').checked,
              include_canada: document.getElementById('include_canada').checked,
            },
          }),
        });

        if (res.ok) {
          showSaveMsg('Preferences saved.', 'success');
        } else {
          showSaveMsg('This link is invalid or has expired.', 'error');
        }
      } catch {
        showSaveMsg('Something went wrong. Please try again.', 'error');
      } finally {
        saveBtn.disabled = false;
      }
    });

    // Request new preferences link
    const requestForm = document.getElementById('request-form');
    const reqBtn = document.getElementById('req-btn');
    const reqMsg = document.getElementById('req-msg');

    requestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('req-email').value.trim();
      if (!email) return;

      reqBtn.disabled = true;
      reqMsg.className = 'msg';

      try {
        const res = await fetch(`${API}/request-preferences`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        if (res.ok) {
          requestForm.reset();
          reqMsg.textContent = "If that address is subscribed, we've sent you a new preferences link.";
          reqMsg.className = 'msg visible success';
        } else if (res.status === 422) {
          reqMsg.textContent = "That doesn't look like a valid email address.";
          reqMsg.className = 'msg visible error';
        } else {
          reqMsg.textContent = 'Something went wrong. Please try again.';
          reqMsg.className = 'msg visible error';
        }
      } catch {
        reqMsg.textContent = 'Something went wrong. Please try again.';
        reqMsg.className = 'msg visible error';
      } finally {
        reqBtn.disabled = false;
      }
    });

    loadPrefs();
  </script>
  <script src="bg.js"></script>
</body>
</html>
